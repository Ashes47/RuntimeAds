name: Feature request
description: Suggest an idea or improvement for RuntimeAds.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Before filing, a quick look at existing requests helps avoid duplicates.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like RuntimeAds to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Earnings / payouts
        - Ad surfaces / display
        - Privacy / data
        - Editor or agent support
        - Dashboard / web
        - Other
    validations:
      required: false
